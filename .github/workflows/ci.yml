name: Homebrew Tap CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-formula:
    name: Validate envlt on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Homebrew is on PATH (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          echo "/home/linuxbrew/.linuxbrew/sbin" >> "$GITHUB_PATH"

      - name: Verify Homebrew
        run: brew --version

      - name: Tap local repository
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/obsidia-systems/homebrew-tap"
          mkdir -p "$(dirname "$TAP_DIR")"
          rm -rf "$TAP_DIR"
          ln -s "$GITHUB_WORKSPACE" "$TAP_DIR"

      - name: Audit formula
        run: brew audit --strict obsidia-systems/tap/envlt

      - name: Install formula from source
        run: brew install --build-from-source obsidia-systems/tap/envlt

      - name: Run formula test
        run: brew test obsidia-systems/tap/envlt
